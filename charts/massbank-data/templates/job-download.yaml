apiVersion: batch/v1
kind: Job
metadata:
  name: "{{ include "massbank-data.fullname" . }}-download-{{ .Chart.Version | replace "." "-" | lower }}"
  labels:
    app.kubernetes.io/name: "{{ include "massbank-data.name" . }}"
    app.kubernetes.io/instance: "{{ .Release.Name }}"
    massbank-data.role: "download"
    massbank-data.chartVersion: "{{ .Chart.Version | replace "." "-" | lower }}"
spec:
  backoffLimit: 2
  template:
    spec:
      restartPolicy: OnFailure
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: {{ include "massbank-data.fullname" . }}-pvc
      containers:
        - name: download
          image: alpine:latest
          command:
            - sh
            - -c
            - |
              set -euo pipefail
              apk add --no-cache wget tar gzip rclone >/dev/null 2>&1 || true

              version="{{ .Chart.AppVersion }}"
              if [ "$version" = "dev" ]; then
                echo "Downloading MassBank-data dev branch from https://github.com/MassBank/MassBank-data/archive/refs/heads/dev.tar.gz"
                wget -q --show-progress --progress=dot:giga -O dev.tar.gz https://github.com/MassBank/MassBank-data/archive/refs/heads/dev.tar.gz
                tar_file="dev.tar.gz"
              else
                if [ "$version" = "latest" ]; then
                  echo "Resolving latest MassBank-data tag from GitHub API..."
                  version=$(wget -q https://api.github.com/repos/MassBank/MassBank-data/releases/latest --output-document - | grep "tag_name" | sed "s/\"tag_name\": //g" | sed "s/\"//g" | sed "s/,//g" | sed "s/ //g")
                  if [ -z "$version" ]; then
                    echo "Failed to resolve latest version from GitHub API" >&2
                    exit 1
                  fi
                  echo "Resolved latest tag: $version"
                fi

                echo "Downloading MassBank-data version: $version from https://github.com/MassBank/MassBank-data/archive/refs/tags/$version.tar.gz"
                wget -q --show-progress --progress=dot:giga -O $version.tar.gz https://github.com/MassBank/MassBank-data/archive/refs/tags/$version.tar.gz
                tar_file="$version.tar.gz"
              fi

              mkdir -p /MassBank-data
              echo "Extract content of $tar_file to temporary location"
              mkdir -p /tmp/MassBank-data
              tar -xzf $tar_file -C /tmp/MassBank-data --strip-components=1
              echo "Sync temporary content to /MassBank-data"
              rclone sync /tmp/MassBank-data /MassBank-data --transfers 16 --stats-one-line -P
              #rsync -a --delete /tmp/MassBank-data/ /MassBank-data
              echo "Download and extraction completed"
          volumeMounts:
            - name: data
              mountPath: /MassBank-data
